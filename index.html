<!doctype html>
<html lang="en" translate="no">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/gif" href="/favicon.gif" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Landan's personal bio page with Discord presence, Spotify activity, recent streams, web stamps, lyrics, and a compact media player."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Landan ;3" />
    <meta property="og:description" content="personal bio, live presence, music, and internet stuff" />
    <meta property="og:image" content="/gogurt-favicon.gif" />
    <meta name="theme-color" content="#050608" />
    <title>Landan ;3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" />
  </head>
  <body autocomplete="off" spellcheck="false">
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true" focusable="false">
      <defs>
        <filter id="melt-filter" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
          <feTurbulence type="turbulence" baseFrequency="0.018 0.042" numOctaves="3" seed="4" result="noise">
            <animate attributeName="baseFrequency" values="0.015 0.038;0.026 0.052;0.015 0.038" dur="6s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G" result="warped"/>
          <feColorMatrix in="warped" type="saturate" values="1.4"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
